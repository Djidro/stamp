<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Loyalty Program - LoyaltySip</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="logo-large">☕</span>
                <h1>Join Loyalty Program</h1>
                <p>Get stamps, earn rewards!</p>
            </div>
            
            <form id="customerForm" class="auth-form">
                <div class="form-group">
                    <label>Select Shop</label>
                    <select id="shopSelect" required>
                        <option value="">Choose a shop...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="customerName" required placeholder="Full name">
                </div>
                
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="customerPhone" required placeholder="Your phone number">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    Join Now ☕
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already a member? <a href="customer-dashboard.html">View My Card</a></p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
    let isSubmitting = false;

    // 🚀 Start loading shops IMMEDIATELY
    loadShops();

    // Wait for DOM to be ready for form handling
    window.addEventListener('DOMContentLoaded', () => {
        if (typeof supabase === 'undefined') {
            console.error('❌ Supabase not loaded');
            return;
        }
        console.log('✅ Supabase ready');
        
        // Load shops again (backup)
        loadShops();
        
        const form = document.getElementById('customerForm');
        const newForm = form.cloneNode(true);
        form.parentNode.replaceChild(newForm, form);
        newForm.addEventListener('submit', handleSubmit);
    });

    async function loadShops() {
        const select = document.getElementById('shopSelect');
        if (!select) return;
        
        select.innerHTML = '<option value="">⏳ Loading shops...</option>';
        
        // Try cache first for instant display
        const cached = localStorage.getItem('shopsCache');
        const cacheTime = localStorage.getItem('shopsCacheTime');
        
        if (cached && cacheTime && (Date.now() - cacheTime < 300000)) {
            const shops = JSON.parse(cached);
            populateDropdown(select, shops);
            console.log('⚡ Loaded from cache');
            return;
        }
        
        try {
            const { data: shops, error } = await supabase
                .from('shops')
                .select('id, shop_name')
                .order('shop_name')
                .limit(50);
            
            if (error) throw error;
            
            if (!shops || shops.length === 0) {
                select.innerHTML = '<option value="">No shops yet</option>';
                return;
            }
            
            localStorage.setItem('shopsCache', JSON.stringify(shops));
            localStorage.setItem('shopsCacheTime', Date.now());
            
            populateDropdown(select, shops);
            console.log('✅ Loaded ' + shops.length + ' shops');
            
        } catch (err) {
            console.error('❌ Error:', err);
            select.innerHTML = '<option value="">⚠️ Tap to retry</option>';
            select.onclick = () => loadShops();
        }
    }

    function populateDropdown(select, shops) {
        select.innerHTML = '<option value="">Choose a shop...</option>';
        shops.forEach(shop => {
            const option = document.createElement('option');
            option.value = shop.id;
            option.textContent = shop.shop_name;
            select.appendChild(option);
        });
    }
    
    async function handleSubmit(e) {
        e.preventDefault();
        
        if (isSubmitting) {
            console.log('⏳ Already submitting...');
            return;
        }
        
        isSubmitting = true;
        
        const shopId = document.getElementById('shopSelect').value;
        const name = document.getElementById('customerName').value.trim();
        const phone = document.getElementById('customerPhone').value.trim();
        
        if (!shopId) {
            showToast('Please select a shop');
            isSubmitting = false;
            return;
        }
        
        if (!name || !phone) {
            showToast('Please fill all fields');
            isSubmitting = false;
            return;
        }
        
        try {
            const { data: existing } = await supabase
                .from('customers')
                .select('id, customer_code')
                .eq('shop_id', shopId)
                .eq('phone', phone)
                .maybeSingle();
            
            if (existing) {
                localStorage.setItem('customerCode', existing.customer_code);
                localStorage.setItem('customerPhone', phone);
                showToast('Welcome back! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'customer-dashboard.html';
                }, 1000);
                isSubmitting = false;
                return;
            }
            
            const { count } = await supabase
                .from('customers')
                .select('*', { count: 'exact', head: true })
                .eq('shop_id', shopId);
            
            const { data: shop } = await supabase
                .from('shops')
                .select('shop_name')
                .eq('id', shopId)
                .single();
            
            const prefix = shop.shop_name
                .split(' ')
                .map(w => w[0])
                .join('')
                .toUpperCase()
                .slice(0, 3);
            
            const code = `${prefix}-${String((count || 0) + 1).padStart(3, '0')}`;
            
            const { data: customer, error } = await supabase
                .from('customers')
                .insert({
                    shop_id: shopId,
                    customer_code: code,
                    name,
                    phone,
                    stamps: 0,
                    free_rewards: 0,
                    total_visits: 0
                })
                .select()
                .single();
            
            if (error) {
                if (error.code === '23505') {
                    showToast('You are already registered!', 'success');
                } else {
                    throw error;
                }
            }
            
            localStorage.setItem('customerCode', code);
            localStorage.setItem('customerPhone', phone);
            
            showToast('Welcome! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = 'customer-dashboard.html';
            }, 1000);
            
        } catch (err) {
            console.error('Registration error:', err);
            showToast(err.message || 'Registration failed');
        } finally {
            isSubmitting = false;
        }
    }
    
    function showToast(message, type = 'error') {
        const toast = document.getElementById('toast');
        if (!toast) return;
        toast.textContent = message;
        toast.className = `toast ${type}`;
        setTimeout(() => toast.className = 'toast hidden', 3000);
    }
</script>

</body>
</html>
