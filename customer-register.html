<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Loyalty Card - LoyaltySip</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="customer-page">
    <a href="index.html" style="position:absolute; top:1rem; left:1rem; color:#6F4E37; text-decoration:none; z-index:10;">← Home</a>
    
    <div class="customer-container">
        <div id="loginSection" class="loyalty-card">
            <div class="card-header">
                <h2>☕ My Loyalty Card</h2>
                <p>Enter your details to view your card</p>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Customer Code</label>
                    <input type="text" id="loginCode" placeholder="e.g., RB-001">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="loginPhone" placeholder="Your phone number">
                </div>
                <button onclick="loginCustomer()" class="btn btn-primary btn-block">
                    View My Card
                </button>
                <p style="text-align:center; margin-top:1rem;">
                    <a href="customer-register.html">Not a member? Join now</a>
                </p>
            </div>
        </div>
        
        <div id="cardSection" class="loyalty-card hidden">
            <div class="card-header">
                <h2 id="shopName">Loading...</h2>
                <p>Digital Loyalty Card</p>
            </div>
            <div class="card-body">
                <div class="customer-info">
                    <h3 id="customerName">...</h3>
                    <p id="customerCode">...</p>
                </div>
                
                <div class="qr-section" style="background:#fff; padding:1.5rem; border-radius:12px; margin:1rem 0; text-align:center;">
                    <div id="customerQR" style="display:inline-block;"></div>
                    <p style="margin-top:0.5rem; font-weight:bold;">📱 Show this to staff</p>
                </div>
                
                <div class="stamps-section">
                    <h4>Stamps</h4>
                    <div class="stamps-grid" id="stampsGrid"></div>
                    <p class="stamps-text">
                        <span id="stampCount">0</span> / <span id="stampTarget">6</span>
                    </p>
                </div>
                
                <div class="rewards-section">
                    <h4>Available Rewards</h4>
                    <div class="reward-count" id="rewardCount">0</div>
                </div>
                
                <div class="history-section">
                    <h4>Recent Activity</h4>
                    <div id="visitHistory"><p class="empty">Loading...</p></div>
                </div>
                
                <div class="messages-section">
                    <h4>📡 Messages from Shop</h4>
                    <div id="shopMessages"><p class="empty">Loading...</p></div>
                </div>
                
                <button onclick="logoutCustomer()" class="btn btn-outline btn-block" style="margin-top:1rem;">
                    Switch Account
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        const savedCode = localStorage.getItem('customerCode');
        const savedPhone = localStorage.getItem('customerPhone');
        
        if (savedCode && savedPhone) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('cardSection').classList.remove('hidden');
            loadCustomerCard(savedCode, savedPhone);
        }
        
        async function loginCustomer() {
            const code = document.getElementById('loginCode').value.trim();
            const phone = document.getElementById('loginPhone').value.trim();
            if (!code || !phone) { showToast('Enter code and phone'); return; }
            
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('cardSection').classList.remove('hidden');
            await loadCustomerCard(code, phone);
        }
        
        async function loadCustomerCard(code, phone) {
            try {
                const { data: customer, error } = await supabase
                    .from('customers')
                    .select('*, shops!inner(shop_name, settings, id)')
                    .eq('customer_code', code)
                    .eq('phone', phone)
                    .single();
                
                if (error || !customer) {
                    showToast('Customer not found');
                    logoutCustomer();
                    return;
                }
                
                localStorage.setItem('customerCode', code);
                localStorage.setItem('customerPhone', phone);
                
                const shop = customer.shops;
                
                document.getElementById('shopName').textContent = shop.shop_name;
                document.getElementById('customerName').textContent = customer.name;
                document.getElementById('customerCode').textContent = customer.customer_code;
                
                // QR Code
                const qrContainer = document.getElementById('customerQR');
                qrContainer.innerHTML = '';
                new QRCode(qrContainer, {
                    text: JSON.stringify({ customer: customer.id, shop: shop.id }),
                    width: 200,
                    height: 200,
                    colorDark: '#6F4E37',
                    colorLight: '#FFFFFF'
                });
                
                // Stamps
                const required = shop.settings?.stamps_required || 6;
                const stamps = customer.stamps || 0;
                document.getElementById('stampTarget').textContent = required;
                document.getElementById('stampCount').textContent = stamps;
                
                let stampsHTML = '';
                for (let i = 0; i < required; i++) {
                    stampsHTML += `<span style="font-size:1.8rem; opacity:${i < stamps ? '1' : '0.3'}">☕</span>`;
                }
                document.getElementById('stampsGrid').innerHTML = stampsHTML;
                document.getElementById('rewardCount').textContent = customer.free_rewards || 0;
                
                // Load in parallel
                Promise.all([
                    loadVisitHistory(customer.id),
                    loadMessages(shop.id)
                ]);
                
            } catch (err) {
                console.error(err);
                showToast('Could not load card');
            }
        }
        
        async function loadVisitHistory(customerId) {
            try {
                const { data } = await supabase
                    .from('visits')
                    .select('action, created_at')
                    .eq('customer_id', customerId)
                    .order('created_at', { ascending: false })
                    .limit(10);
                
                const container = document.getElementById('visitHistory');
                if (!data?.length) {
                    container.innerHTML = '<p class="empty">No visits yet</p>';
                    return;
                }
                
                let html = '';
                data.forEach(v => {
                    html += `<div style="display:flex; justify-content:space-between; padding:0.5rem; border-bottom:1px solid #eee;">
                        <span>${v.action === 'stamp' ? '☕ Stamp' : '🎁 Reward'}</span>
                        <span style="color:#888; font-size:0.85rem;">${new Date(v.created_at).toLocaleDateString()}</span>
                    </div>`;
                });
                container.innerHTML = html;
            } catch (err) {
                document.getElementById('visitHistory').innerHTML = '<p class="empty">Error</p>';
            }
        }
        
        async function loadMessages(shopId) {
            try {
                const { data } = await supabase
                    .from('notifications')
                    .select('title, message, sent_at')
                    .eq('shop_id', shopId)
                    .order('sent_at', { ascending: false })
                    .limit(5);
                
                const container = document.getElementById('shopMessages');
                if (!data?.length) {
                    container.innerHTML = '<p class="empty">No messages</p>';
                    return;
                }
                
                let html = '';
                data.forEach(m => {
                    html += `<div style="background:#f9f5f0; padding:0.75rem; margin-bottom:0.5rem; border-radius:8px;">
                        <strong>${m.title}</strong>
                        <p style="margin:0.25rem 0; font-size:0.9rem;">${m.message}</p>
                        <small style="color:#888;">${new Date(m.sent_at).toLocaleDateString()}</small>
                    </div>`;
                });
                container.innerHTML = html;
            } catch (err) {
                document.getElementById('shopMessages').innerHTML = '<p class="empty">Error</p>';
            }
        }
        
        function logoutCustomer() {
            localStorage.removeItem('customerCode');
            localStorage.removeItem('customerPhone');
            location.reload();
        }
        
        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            setTimeout(() => toast.className = 'toast hidden', 3000);
        }
    </script>
</body>
</html>
