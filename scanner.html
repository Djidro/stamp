<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner - LoyaltySip</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="scanner-page">
    <div class="scanner-container">
        <div class="scanner-header">
            <a href="dashboard.html" class="btn btn-outline btn-sm">← Back</a>
            <h1>Scan Customer QR</h1>
        </div>

        <div id="loadingMessage" style="text-align:center; padding:2rem;">
            <p>📷 Starting camera...</p>
        </div>

        <div class="scanner-wrapper" id="scannerWrapper" style="display:none;">
            <div id="reader" style="width:100%; max-width:400px; margin:0 auto;"></div>
        </div>

        <div id="scanResult" class="scan-result hidden">
            <div class="customer-found">
                <h3>👤 <span id="scannedName">Customer</span></h3>
                <div class="stamp-display">
                    <span id="currentStamps">0</span> / <span id="requiredStamps">6</span> stamps
                </div>
                <div class="stamp-visual" id="stampVisual"></div>
                <div class="reward-badge hidden" id="rewardBadge">🎁 Reward Available!</div>
            </div>
            
            <div class="action-buttons">
                <button onclick="addStamp()" class="btn btn-primary btn-large">☕ Add Stamp</button>
                <button onclick="redeemReward()" class="btn btn-success btn-large" id="redeemBtn">🎁 Redeem Reward</button>
                <button onclick="scanAgain()" class="btn btn-outline" style="margin-top:0.5rem;">📷 Scan Next</button>
            </div>
        </div>

        <div id="manualEntry" class="manual-entry">
            <p>Camera not working?</p>
            <div class="form-group">
                <input type="text" id="manualCode" placeholder="Enter customer code (e.g. RB-001)">
                <button onclick="manualLookup()" class="btn btn-outline">Lookup</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
    let html5QrCode = null;
    let currentCustomer = null;
    let shopSettings = { stamps_required: 6 };
    let currentShop = null;
    let isScanning = false;

    initScanner();

    async function initScanner() {
        try {
            currentShop = await window.getCurrentShop();
            if (!currentShop) {
                window.location.href = 'login.html';
                return;
            }
            if (currentShop.settings) {
                shopSettings = currentShop.settings;
            }
            startCamera();
        } catch (err) {
            console.error('Init error:', err);
            document.getElementById('loadingMessage').innerHTML = 
                '<p style="color:red;">⚠️ Camera not available</p><p>Use manual entry below</p>';
        }
    }

    async function startCamera() {
        try {
            html5QrCode = new Html5Qrcode("reader");
            const config = {
                fps: 30,
                qrbox: { width: 300, height: 300 },
                aspectRatio: 1
            };
            await html5QrCode.start(
                { facingMode: "environment" },
                config,
                onScanSuccess,
                onScanFailure
            );
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('scannerWrapper').style.display = 'block';
            isScanning = true;
        } catch (err) {
            console.error('Camera error:', err);
            document.getElementById('loadingMessage').innerHTML = 
                '<p style="color:red;">⚠️ Camera error</p><p>Use manual entry below</p>';
        }
    }

    function onScanSuccess(decodedText) {
        if (!isScanning) return;
        try {
            const data = JSON.parse(decodedText);
            if (data.customer && data.shop) {
                isScanning = false;
                loadCustomer(data.customer, data.shop);
            }
        } catch (e) {
            manualLookup(decodedText);
        }
    }

    function onScanFailure(error) {}

    function scanAgain() {
        document.getElementById('scanResult').classList.add('hidden');
        currentCustomer = null;
        isScanning = true;
        if (html5QrCode) html5QrCode.resume();
    }

    async function loadCustomer(customerId, shopId) {
        if (currentShop.id !== shopId) {
            showToast('❌ Not your customer');
            scanAgain();
            return;
        }
        try {
            const { data: customer, error } = await supabase
                .from('customers')
                .select('*')
                .eq('id', customerId)
                .eq('shop_id', shopId)
                .single();
            
            if (error || !customer) {
                showToast('Customer not found');
                scanAgain();
                return;
            }
            currentCustomer = customer;
            displayCustomer();
            if (html5QrCode) html5QrCode.pause();
        } catch (err) {
            showToast(err.message);
            scanAgain();
        }
    }

    function displayCustomer() {
        if (!currentCustomer) return;
        
        const required = shopSettings.stamps_required || 6;
        const stamps = currentCustomer.stamps || 0;
        const freeRewards = currentCustomer.free_rewards || 0;
        
        document.getElementById('scanResult').classList.remove('hidden');
        document.getElementById('scannedName').textContent = currentCustomer.name;
        document.getElementById('currentStamps').textContent = stamps;
        document.getElementById('requiredStamps').textContent = required;
        
        // Stamps visual
        let html = '';
        for (let i = 0; i < required; i++) {
            html += `<span style="font-size:1.5rem; opacity:${i < stamps ? '1' : '0.3'}">☕</span>`;
        }
        document.getElementById('stampVisual').innerHTML = html;
        
        // ✅ FIXED: Reward button logic
        const badge = document.getElementById('rewardBadge');
        const redeemBtn = document.getElementById('redeemBtn');
        
        console.log('🔍 Debug:', { stamps, required, freeRewards, stampsComplete: stamps >= required });
        
        if (freeRewards > 0) {
            // Has free rewards
            badge.classList.remove('hidden');
            badge.textContent = `🎁 ${freeRewards} Reward(s) Available!`;
            redeemBtn.disabled = false;
            redeemBtn.textContent = '🎁 Redeem Reward';
            redeemBtn.style.opacity = '1';
        } else if (stamps >= required) {
            // Stamps complete but no free rewards (shouldn't happen normally)
            badge.classList.remove('hidden');
            badge.textContent = '✅ Complete! Add stamp to claim reward';
            redeemBtn.disabled = true;
            redeemBtn.textContent = 'Add stamp first';
        } else {
            // Not enough stamps
            badge.classList.add('hidden');
            redeemBtn.disabled = true;
            redeemBtn.textContent = `🔒 ${required - stamps} more stamps needed`;
        }
    }

    async function addStamp() {
        if (!currentCustomer) return;
        
        const required = shopSettings.stamps_required || 6;
        let newStamps = (currentCustomer.stamps || 0) + 1;
        let newRewards = currentCustomer.free_rewards || 0;
        
        if (newStamps >= required) {
            newStamps = 0;
            newRewards += 1;
        }
        
        try {
            const { error } = await supabase.from('customers').update({
                stamps: newStamps,
                free_rewards: newRewards,
                total_visits: (currentCustomer.total_visits || 0) + 1
            }).eq('id', currentCustomer.id);
            
            if (error) throw error;
            
            // Insert visit
            await supabase.from('visits').insert({
                shop_id: currentShop.id,
                customer_id: currentCustomer.id,
                action: 'stamp',
                notes: '',
                created_at: new Date().toISOString()
            });
            
            if (newRewards > (currentCustomer.free_rewards || 0)) {
                showToast('🎉 Stamp complete! Reward earned!', 'success');
            } else {
                showToast(`✅ Stamp added! ${required - newStamps} to go`, 'success');
            }
            
            // Refresh
            const { data: updated } = await supabase
                .from('customers')
                .select('*')
                .eq('id', currentCustomer.id)
                .single();
            
            if (updated) {
                currentCustomer = updated;
                displayCustomer();
            }
        } catch (err) {
            console.error('Add stamp error:', err);
            showToast(err.message);
        }
    }

    async function redeemReward() {
        if (!currentCustomer) return;
        
        const freeRewards = currentCustomer.free_rewards || 0;
        
        console.log('🎁 Redeem clicked:', { freeRewards });
        
        if (freeRewards < 1) {
            showToast('No rewards available');
            return;
        }
        
        try {
            const { error } = await supabase.from('customers').update({
                free_rewards: freeRewards - 1
            }).eq('id', currentCustomer.id);
            
            if (error) throw error;
            
            await supabase.from('visits').insert({
                shop_id: currentShop.id,
                customer_id: currentCustomer.id,
                action: 'redeem',
                notes: 'Reward redeemed',
                created_at: new Date().toISOString()
            });
            
            showToast('🎁 Reward redeemed! Enjoy!', 'success');
            
            // Refresh
            const { data: updated } = await supabase
                .from('customers')
                .select('*')
                .eq('id', currentCustomer.id)
                .single();
            
            if (updated) {
                currentCustomer = updated;
                displayCustomer();
            }
        } catch (err) {
            console.error('Redeem error:', err);
            showToast(err.message);
        }
    }

    async function manualLookup(code) {
        const lookupCode = code || document.getElementById('manualCode')?.value?.trim();
        if (!lookupCode) { showToast('Enter a customer code'); return; }
        
        try {
            const { data: customer, error } = await supabase
                .from('customers')
                .select('*')
                .eq('shop_id', currentShop.id)
                .eq('customer_code', lookupCode)
                .single();
            
            if (error || !customer) {
                showToast('Customer not found');
                return;
            }
            currentCustomer = customer;
            displayCustomer();
            if (html5QrCode) html5QrCode.pause();
        } catch (err) {
            showToast(err.message);
        }
    }

    function showToast(message, type = 'error') {
        const toast = document.getElementById('toast');
        if (!toast) return;
        toast.textContent = message;
        toast.className = `toast ${type}`;
        setTimeout(() => toast.className = 'toast hidden', 3000);
    }

    window.addEventListener('beforeunload', () => {
        if (html5QrCode) html5QrCode.stop().catch(() => {});
    });
</script>
  
</body>
</html>
