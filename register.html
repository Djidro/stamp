<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Shop - LoyaltySip</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="logo-large">☕</span>
                <h1>Create Your Shop</h1>
                <p>Start your digital loyalty program</p>
            </div>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="shopName">Shop Name</label>
                    <input type="text" id="shopName" required placeholder="e.g. Royal Bakes">
                </div>
                
                <div class="form-group">
                    <label for="ownerName">Owner Name</label>
                    <input type="text" id="ownerName" required placeholder="Full name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="shop@example.com">
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" placeholder="+1 234 567 890">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="6" placeholder="Min 6 characters">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="spinner hidden"></span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
            
            <div id="toast" class="toast hidden"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        const form = document.getElementById('registerForm');
        const toast = document.getElementById('toast');
        const submitBtn = document.getElementById('submitBtn');
        
        function showToast(message, type = 'error') {
            toast.textContent = message;
            toast.className = `toast ${type}`;
            setTimeout(() => toast.className = 'toast hidden', 4000);
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.querySelector('.btn-text').textContent = 'Creating...';
            
            const shopName = document.getElementById('shopName').value;
            const ownerName = document.getElementById('ownerName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            shop_name: shopName,
                            owner_name: ownerName,
                            phone: phone
                        }
                    }
                });
                
                if (error) throw error;
                
                // Update shop with phone
                await supabase.from('shops').update({ phone }).eq('id', data.user.id);
                
                showToast('Account created! Check your email to verify.', 'success');
                setTimeout(() => window.location.href = 'login.html', 2000);
                
            } catch (err) {
                showToast(err.message);
                submitBtn.disabled = false;
                submitBtn.querySelector('.btn-text').textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
