<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner - LoyaltySip</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="scanner-page">
    <div class="scanner-container">
        <div class="scanner-header">
            <a href="dashboard.html" class="btn btn-outline btn-sm">← Back</a>
            <h1>Scan Customer QR</h1>
        </div>

        <div id="loadingMessage" style="text-align:center; padding:2rem;">
            <p>📷 Starting camera...</p>
        </div>

        <div class="scanner-wrapper" id="scannerWrapper" style="display:none;">
            <div id="reader" style="width:100%; max-width:400px; margin:0 auto;"></div>
        </div>

        <div id="scanResult" class="scan-result hidden">
            <div class="customer-found">
                <h3>👤 <span id="scannedName">Customer</span></h3>
                <div class="stamp-display">
                    <span id="currentStamps">0</span> / <span id="requiredStamps">6</span> stamps
                </div>
                <div class="stamp-visual" id="stampVisual"></div>
                <div class="reward-badge hidden" id="rewardBadge">🎁 Reward Available!</div>
            </div>
            
            <div class="action-buttons">
                <button onclick="addStamp()" class="btn btn-primary btn-large">☕ Add Stamp</button>
                <button onclick="redeemReward()" class="btn btn-success btn-large" id="redeemBtn">🎁 Redeem Reward</button>
                <button onclick="scanAgain()" class="btn btn-outline" style="margin-top:0.5rem;">📷 Scan Next</button>
            </div>
        </div>

        <div id="manualEntry" class="manual-entry">
            <p>Camera not working?</p>
            <div class="form-group">
                <input type="text" id="manualCode" placeholder="Enter customer code (e.g. RB-001)">
                <button onclick="manualLookup()" class="btn btn-outline">Lookup</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
    // ============================================
    // VARIABLES
    // ============================================
    let html5QrCode = null;
    let currentCustomer = null;
    let shopSettings = { stamps_required: 6 };
    let currentShop = null;
    let isScanning = false;
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vZXdhbnNoZWt6cGpmZ3R5eXp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MjAwMjgsImV4cCI6MjA5NDM5NjAyOH0.AGd2ciUMPt1w4UqHpinJNQni08r0GPP-5-R7z_fvPn4';

    // Start
    initScanner();

    async function initScanner() {
        try {
            currentShop = await window.getCurrentShop();
            if (!currentShop) {
                window.location.href = 'login.html';
                return;
            }
            if (currentShop.settings) shopSettings = currentShop.settings;
            startCamera();
        } catch (err) {
            document.getElementById('loadingMessage').innerHTML = 
                '<p style="color:red;">⚠️ Error</p><p>Use manual entry</p>';
        }
    }

    async function startCamera() {
        try {
            if (html5QrCode) {
                await html5QrCode.stop().catch(() => {});
                html5QrCode = null;
            }
            document.getElementById('reader').innerHTML = '';
            html5QrCode = new Html5Qrcode("reader");
            
            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1 },
                (decodedText) => {
                    if (!isScanning) return;
                    isScanning = false;
                    console.log('✅ QR:', decodedText);
                    if (html5QrCode) html5QrCode.pause().catch(() => {});
                    processScan(decodedText);
                },
                () => {}
            );
            
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('scannerWrapper').style.display = 'block';
            isScanning = true;
            console.log('✅ Camera ready');
        } catch (err) {
            document.getElementById('loadingMessage').innerHTML = 
                '<p style="color:red;">⚠️ Camera error</p><p>Use manual entry</p>';
        }
    }

    async function processScan(decodedText) {
        document.getElementById('scanResult').classList.remove('hidden');
        document.getElementById('scannedName').textContent = 'Loading...';
        
        try {
            const data = JSON.parse(decodedText);
            if (data.customer && data.shop) {
                await directFetchCustomer(data.customer, data.shop);
            } else {
                showToast('Invalid QR');
                scanAgain();
            }
        } catch (e) {
            // Try as customer code
            await directLookupByCode(decodedText);
        }
    }

    function scanAgain() {
        document.getElementById('scanResult').classList.add('hidden');
        currentCustomer = null;
        isScanning = true;
        if (html5QrCode) html5QrCode.resume().catch(() => startCamera());
        else startCamera();
    }

    // ============================================
    // DIRECT FETCH FUNCTIONS (bypass supabase library)
    // ============================================
    async function directFetchCustomer(customerId, shopId) {
        if (currentShop.id !== shopId) {
            showToast('❌ Not your customer');
            scanAgain();
            return;
        }
        await directLookupById(customerId);
    }

    async function directLookupByCode(code) {
        const url = `https://ooewanshekzpjfgtyyzx.supabase.co/rest/v1/customers?select=*&customer_code=eq.${code}&shop_id=eq.${currentShop.id}`;
        await directFetch(url);
    }

    async function directLookupById(id) {
        const url = `https://ooewanshekzpjfgtyyzx.supabase.co/rest/v1/customers?select=*&id=eq.${id}`;
        await directFetch(url);
    }

    async function directFetch(url) {
        try {
            console.log('🔍 Fetching:', url);
            const response = await fetch(url, {
                headers: {
                    'apikey': ANON_KEY,
                    'Content-Type': 'application/json'
                }
            });
            
            const data = await response.json();
            console.log('📊 Result:', data);
            
            if (data && data.length > 0) {
                currentCustomer = data[0];
                displayCustomer();
                showToast('✅ Customer found!', 'success');
            } else {
                showToast('Customer not found');
                scanAgain();
            }
        } catch (err) {
            console.error('Fetch error:', err);
            showToast('Error');
            scanAgain();
        }
    }

    function displayCustomer() {
        if (!currentCustomer) return;
        
        const required = shopSettings.stamps_required || 6;
        const stamps = currentCustomer.stamps || 0;
        const freeRewards = currentCustomer.free_rewards || 0;
        
        document.getElementById('scanResult').classList.remove('hidden');
        document.getElementById('scannedName').textContent = currentCustomer.name;
        document.getElementById('currentStamps').textContent = stamps;
        document.getElementById('requiredStamps').textContent = required;
        
        let html = '';
        for (let i = 0; i < required; i++) {
            html += `<span style="font-size:1.8rem; opacity:${i < stamps ? '1' : '0.3'}">☕</span>`;
        }
        document.getElementById('stampVisual').innerHTML = html;
        
        const badge = document.getElementById('rewardBadge');
        const redeemBtn = document.getElementById('redeemBtn');
        
        if (freeRewards > 0) {
            badge.classList.remove('hidden');
            badge.textContent = `🎁 ${freeRewards} Reward(s)!`;
            redeemBtn.disabled = false;
            redeemBtn.textContent = '🎁 Redeem Reward';
        } else if (stamps >= required) {
            badge.classList.remove('hidden');
            badge.textContent = '✅ Complete! Add stamp';
            redeemBtn.disabled = true;
            redeemBtn.textContent = 'Add stamp first';
        } else {
            badge.classList.add('hidden');
            redeemBtn.disabled = true;
            redeemBtn.textContent = `🔒 ${required - stamps} more`;
        }
    }

    // ============================================
    // ACTIONS (using supabase - these should work)
    // ============================================
    async function addStamp() {
        if (!currentCustomer) return;
        
        const required = shopSettings.stamps_required || 6;
        let newStamps = (currentCustomer.stamps || 0) + 1;
        let newRewards = currentCustomer.free_rewards || 0;
        
        if (newStamps >= required) { newStamps = 0; newRewards += 1; }
        
        try {
            await supabase.from('customers').update({
                stamps: newStamps,
                free_rewards: newRewards,
                total_visits: (currentCustomer.total_visits || 0) + 1
            }).eq('id', currentCustomer.id);
            
            await supabase.from('visits').insert({
                shop_id: currentShop.id,
                customer_id: currentCustomer.id,
                action: 'stamp',
                notes: '',
                created_at: new Date().toISOString()
            });
            
            showToast(newRewards > (currentCustomer.free_rewards || 0) ? '🎉 Reward earned!' : '✅ Stamp added!', 'success');
            await directLookupById(currentCustomer.id);
        } catch (err) { showToast(err.message); }
    }

    async function redeemReward() {
        if (!currentCustomer || (currentCustomer.free_rewards || 0) < 1) {
            showToast('No rewards'); return;
        }
        
        const btn = document.getElementById('redeemBtn');
        btn.disabled = true;
        btn.textContent = 'Processing...';
        
        try {
            await supabase.from('customers').update({
                free_rewards: currentCustomer.free_rewards - 1
            }).eq('id', currentCustomer.id);
            
            await supabase.from('visits').insert({
                shop_id: currentShop.id,
                customer_id: currentCustomer.id,
                action: 'redeem',
                notes: 'Reward redeemed',
                created_at: new Date().toISOString()
            });
            
            showToast('🎁 Redeemed!', 'success');
            await directLookupById(currentCustomer.id);
        } catch (err) { showToast(err.message); btn.disabled = false; }
    }

   function manualLookup(code) {
    const lookupCode = code || document.getElementById('manualCode')?.value?.trim();
    if (!lookupCode) { showToast('Enter a code'); return; }
    
    // Only pause if actually scanning
    if (html5QrCode && isScanning) {
        html5QrCode.pause().catch(() => {});
        isScanning = false;
    }
    
    // Show result section
    document.getElementById('scanResult').classList.remove('hidden');
    document.getElementById('scannedName').textContent = 'Loading...';
    
    directLookupByCode(lookupCode);
}
    function showToast(message, type = 'error') {
        const toast = document.getElementById('toast');
        if (!toast) return;
        toast.textContent = message;
        toast.className = `toast ${type}`;
        setTimeout(() => toast.className = 'toast hidden', 2500);
    }

    window.addEventListener('beforeunload', () => {
        if (html5QrCode) html5QrCode.stop().catch(() => {});
    });
</script>
 
</body>
</html>
