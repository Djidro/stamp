<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Loyalty Program - LoyaltySip</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <a href="index.html" style="position:absolute; top:1rem; left:1rem; color:#6F4E37; text-decoration:none;">← Home</a>
    
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="logo-large">☕</span>
                <h1>Join Loyalty Program</h1>
            </div>
            
            <form id="customerForm" class="auth-form">
                <div class="form-group">
                    <label>Select Shop</label>
                    <select id="shopSelect" required>
                        <option value="">⏳ Loading shops...</option>
                    </select>
                    <button type="button" onclick="shopsLoaded=false; loadShops();" style="font-size:0.75rem; background:none; border:none; color:#6F4E37; cursor:pointer; text-decoration:underline;">🔄 Refresh</button>
                </div>
                
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="customerName" required placeholder="Full name">
                </div>
                
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="customerPhone" required placeholder="Your phone number">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    Join Now ☕
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already a member? <a href="customer-dashboard.html">View My Card</a></p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
        let isSubmitting = false;
        let shopsLoaded = false;

        async function loadShops() {
            const select = document.getElementById('shopSelect');
            if (!select || shopsLoaded) return;
            
            select.innerHTML = '<option value="">⏳ Loading...</option>';
            
            try {
                const { data: shops, error } = await supabase
                    .from('shops')
                    .select('id, shop_name')
                    .order('shop_name')
                    .limit(50);
                
                if (error) throw error;
                
                if (!shops || shops.length === 0) {
                    select.innerHTML = '<option value="">No shops yet</option>';
                    return;
                }
                
                select.innerHTML = '<option value="">Choose a shop...</option>';
                shops.forEach(shop => {
                    const opt = document.createElement('option');
                    opt.value = shop.id;
                    opt.textContent = shop.shop_name;
                    select.appendChild(opt);
                });
                
                shopsLoaded = true;
                console.log('✅ ' + shops.length + ' shops loaded');
                
            } catch (err) {
                console.error('Error:', err);
                select.innerHTML = '<option value="">⚠️ Error - Tap refresh</option>';
            }
        }

        // Call ONCE after Supabase is ready
        setTimeout(() => {
            if (typeof supabase !== 'undefined') {
                loadShops();
            }
        }, 500);
    // Also load when DOM is ready
    window.addEventListener('DOMContentLoaded', () => {
        loadShops();
        
        const form = document.getElementById('customerForm');
        const newForm = form.cloneNode(true);
        form.parentNode.replaceChild(newForm, form);
        newForm.addEventListener('submit', handleSubmit);
    });
    
    async function handleSubmit(e) {
        e.preventDefault();
        if (isSubmitting) return;
        isSubmitting = true;
        
        const shopId = document.getElementById('shopSelect').value;
        const name = document.getElementById('customerName').value.trim();
        const phone = document.getElementById('customerPhone').value.trim();
        
        if (!shopId) { showToast('Select a shop'); isSubmitting = false; return; }
        if (!name || !phone) { showToast('Fill all fields'); isSubmitting = false; return; }
        
        try {
            const { data: existing } = await supabase
                .from('customers')
                .select('customer_code')
                .eq('shop_id', shopId)
                .eq('phone', phone)
                .maybeSingle();
            
            if (existing) {
                localStorage.setItem('customerCode', existing.customer_code);
                localStorage.setItem('customerPhone', phone);
                showToast('Welcome back! 🎉', 'success');
                setTimeout(() => location.href = 'customer-dashboard.html', 800);
                return;
            }
            
            const { count } = await supabase
                .from('customers')
                .select('*', { count: 'exact', head: true })
                .eq('shop_id', shopId);
            
            const { data: shop } = await supabase
                .from('shops')
                .select('shop_name')
                .eq('id', shopId)
                .single();
            
            const prefix = shop.shop_name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 3);
            const code = prefix + '-' + String((count || 0) + 1).padStart(3, '0');
                        // Check if referral - start with 1 bonus stamp
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            const bonusStamps = refCode ? 1 : 0;
            
            const { error } = await supabase.from('customers').insert({
                shop_id: shopId, customer_code: code, name, phone,
                stamps: bonusStamps, free_rewards: 0, total_visits: 0
            });
            
            
            if (error) throw error;
            
            localStorage.setItem('customerCode', code);
            localStorage.setItem('customerPhone', phone);
            showToast('Welcome! 🎉', 'success');
            setTimeout(() => location.href = 'customer-dashboard.html', 800);
                        
            // 👥 Give +1 stamp to referrer
            if (refCode) {
                const { data: referrer } = await supabase
                    .from('customers')
                    .select('id, stamps')
                    .eq('customer_code', refCode)
                    .single();
                if (referrer) {
                    await supabase.from('customers')
                        .update({ stamps: (referrer.stamps || 0) + 1 })
                        .eq('id', referrer.id);
                }
            }
        } catch (err) {
            console.error(err);
            showToast(err.message || 'Failed');
        } finally {
            isSubmitting = false;
        }
    }
    
    function showToast(msg, type = 'error') {
        const t = document.getElementById('toast');
        if (!t) return;
        t.textContent = msg;
        t.className = 'toast ' + type;
        setTimeout(() => t.className = 'toast hidden', 3000);
    }
</script>
</body>
</html>
