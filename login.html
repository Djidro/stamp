<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Login - LoyaltySip</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <a href="index.html" style="position:absolute; top:1rem; left:1rem; color:#6F4E37; text-decoration:none; font-weight:600; background:rgba(255,255,255,0.8); padding:0.5rem 0.75rem; border-radius:20px; z-index:10;">← Home</a>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="logo-large">☕</span>
                <h1>Welcome Back</h1>
                <p>Sign in to your shop dashboard</p>
            </div>
            
            <form id="loginForm" class="auth-form" autocomplete="on">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        autocomplete="email"
                        required 
                        placeholder="shop@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        autocomplete="current-password"
                        required 
                        placeholder="Your password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>New here? <a href="register.html">Create shop</a></p>
            </div>
            
            <div id="toast" class="toast hidden"></div>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Your config -->
    <script src="supabase-config.js"></script>
    
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            
            if (typeof supabase === 'undefined') {
                console.error('❌ Supabase not loaded');
                alert('Error loading app. Please refresh the page.');
                return;
            }
            
            const form = document.getElementById('loginForm');
            const toast = document.getElementById('toast');
            const submitBtn = document.getElementById('submitBtn');
            
            function showToast(message, type = 'error') {
                toast.textContent = message;
                toast.className = `toast ${type}`;
                setTimeout(() => toast.className = 'toast hidden', 4000);
            }
            
            supabase.auth.getSession().then(({ data: { session } }) => {
                if (session) window.location.href = 'dashboard.html';
            }).catch(err => console.error('Session check error:', err));
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                submitBtn.disabled = true;
                submitBtn.querySelector('.btn-text').textContent = 'Signing in...';
                
                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    });
                    
                    if (error) throw error;
                    
                    showToast('Welcome back!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 500);
                    
                } catch (err) {
                    console.error('Login error:', err);
                    showToast(err.message || 'Login failed. Check credentials.');
                    submitBtn.disabled = false;
                    submitBtn.querySelector('.btn-text').textContent = 'Sign In';
                }
            });
        });
    </script>
</body>
</html>
