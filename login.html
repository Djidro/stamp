<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Login - LoyaltySip</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="logo-large">☕</span>
                <h1>Welcome Back</h1>
                <p>Sign in to your shop dashboard</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="shop@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Your password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>New here? <a href="register.html">Create shop</a></p>
            </div>
            
            <div id="toast" class="toast hidden"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const toast = document.getElementById('toast');
        
        function showToast(message, type = 'error') {
            toast.textContent = message;
            toast.className = `toast ${type}`;
            setTimeout(() => toast.className = 'toast hidden', 4000);
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });
                
                if (error) throw error;
                window.location.href = 'dashboard.html';
                
            } catch (err) {
                showToast(err.message);
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
